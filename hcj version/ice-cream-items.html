<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products - Ibaco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }

        .clip-ribbon-left {
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
        }

        .clip-ribbon-right {
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive'],
                    },
                    colors: {
                        primary: '#922B21',
                        secondary: '#D81B60',
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen w-full relative font-sans text-[#5D4037] overflow-x-hidden bg-pink-50">

    <!-- Background with Overlay -->
    <div class="fixed inset-0 z-0">
        <!-- Using placeholder for bg -->
        <div class="absolute inset-0 bg-white/10 mix-blend-soft-light"></div>
        <div class="absolute top-20 left-20 w-72 h-72 bg-pink-400/20 rounded-full blur-3xl animate-blob"></div>
    </div>

    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <div class="relative pt-32 pb-16 px-4 flex flex-col items-center flex-grow z-10" style="min-height: 85vh;">

        <!-- Top Floating Pill Header -->
        <div
            class="bg-gradient-to-r from-[#F5F5F5]/90 to-[#FFFFFF]/90 backdrop-blur-md px-12 py-3 rounded-full border border-[#D7CCC8] shadow-lg mb-8 animate-fade-in-down transform hover:scale-105 transition-transform duration-500">
            <h1 class="text-xl md:text-3xl font-serif font-bold text-[#6D4C41] tracking-wide text-center">
                Ice Cream that melt your heart
            </h1>
        </div>

        <!-- Hero Image Group - Floating & Glowing -->
        <div class="relative w-full max-w-5xl mb-12 animate-float group perspective-1000">
            <!-- Glow behind image -->
            <div
                class="absolute inset-0 bg-white/40 filter blur-[80px] rounded-full scale-75 opacity-60 group-hover:opacity-80 transition-opacity duration-1000">
            </div>
            <!-- Placeholder for hero image: top.png -->
            <img src="assets/ice cream products/cotton candy.png" alt="Hero Collection"
                class="w-full h-64 md:h-96 object-contain drop-shadow-[0_15px_35px_rgba(0,0,0,0.15)] relative z-10 transition-transform duration-700 ease-out group-hover:scale-[1.02] group-hover:rotate-1">
        </div>

        <!-- Tagline Strip - Glassmorphism -->
        <div class="w-full max-w-4xl py-3 flex justify-center items-center mb-16 relative glass rounded-2xl">
            <p
                class="relative z-10 text-lg md:text-2xl text-[#4E342E] font-medium text-center font-serif tracking-wide drop-shadow-sm px-6">
                Choose from 30+ unique Ice creams, 12+ stunning Ice Cakes
            </p>
        </div>

        <!-- "The World of Ibaco" Main Section -->
        <div class="w-full max-w-[85rem] relative mt-8">

            <!-- Outer Fancy Border Frame -->
            <div
                class="absolute -inset-4 md:-inset-8 rounded-[4rem] border-[3px] border-[#D7CCC8]/60 pointer-events-none z-0 shadow-[inset_0_0_40px_rgba(255,255,255,0.5)]">
            </div>
            <div
                class="absolute -inset-4 md:-inset-8 rounded-[4rem] border border-white/80 pointer-events-none z-0 mix-blend-overlay">
            </div>

            <!-- Ribbon Header -->
            <div class="absolute -top-10 left-1/2 transform -translate-x-1/2 z-20 w-[280px] md:w-[400px]">
                <div
                    class="relative bg-gradient-to-b from-[#efebe9] to-[#d7ccc8] px-4 py-3 md:py-4 rounded-lg shadow-lg text-center border-t border-white/50">
                    <h2 class="text-2xl md:text-3xl font-serif font-bold text-[#5D4037] drop-shadow-sm">The World of
                        Ibaco</h2>
                    <div
                        class="absolute top-3 -left-2 w-4 h-full bg-[#8D6E63] transform skew-y-[30deg] -z-10 rounded-sm shadow-md">
                    </div>
                    <div
                        class="absolute top-3 -right-2 w-4 h-full bg-[#8D6E63] transform -skew-y-[30deg] -z-10 rounded-sm shadow-md">
                    </div>
                </div>
                <div
                    class="absolute top-1/2 -left-8 w-10 h-10 bg-[#d7ccc8] transform -translate-y-1/2 -z-20 clip-ribbon-left">
                </div>
                <div
                    class="absolute top-1/2 -right-8 w-10 h-10 bg-[#d7ccc8] transform -translate-y-1/2 -z-20 clip-ribbon-right">
                </div>
            </div>

            <!-- Products Grid -->
            <div class="pt-20 pb-12 px-4 md:px-12 flex flex-col gap-12">

                <!-- Row 1: 3 Items -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-12 items-end">

                    <!-- Item 1 -->
                    <div class="flex flex-col items-center group relative z-10 scale-110">
                        <div onclick="window.location.href='ice-cream-items.html'"
                            class="relative w-full aspect-[4/5] bg-gradient-to-b from-white/40 to-white/10 backdrop-blur-xl rounded-[3rem] border border-white/60 shadow-[0_10px_30px_rgba(139,83,72,0.1)] transition-all duration-500 group-hover:bg-white/60 group-hover:scale-[1.03] group-hover:shadow-[0_20px_50px_rgba(139,83,72,0.2)] cursor-pointer overflow-visible flex flex-col items-center justify-end pb-8">
                            <div class="absolute -top-10 w-full h-[75%] flex items-center justify-center p-2">
                                <img src="assets/ice cream products/bean vanilla.png" alt="Ice Creams"
                                    class="w-[90%] h-[90%] object-contain filter drop-shadow-2xl transition-transform duration-700 ease-in-out group-hover:scale-110 group-hover:-translate-y-2 group-hover:rotate-2">
                            </div>
                            <div class="z-10 text-center mt-auto px-4">
                                <h3
                                    class="text-xl md:text-2xl font-serif font-bold text-[#4E342E] leading-tight mb-2 drop-shadow-sm">
                                    Ice Creams</h3>
                            </div>
                        </div>
                        <button onclick="window.location.href='ice-cream-items.html'"
                            class="-mt-5 z-20 bg-gradient-to-r from-[#bcaa99] to-[#a1887f] text-white font-bold text-xs md:text-sm px-8 py-2.5 rounded-full shadow-lg hover:shadow-xl hover:from-[#a1887f] hover:to-[#8d6e63] transition-all transform hover:-translate-y-1 uppercase tracking-widest border border-white/20">
                            VIEW FLAVORS
                        </button>
                    </div>

                    <!-- Item 2 -->
                    <div class="flex flex-col items-center group relative z-10">
                        <div
                            class="relative w-full aspect-[4/5] bg-gradient-to-b from-white/40 to-white/10 backdrop-blur-xl rounded-[3rem] border border-white/60 shadow-[0_10px_30px_rgba(139,83,72,0.1)] transition-all duration-500 group-hover:bg-white/60 group-hover:scale-[1.03] group-hover:shadow-[0_20px_50px_rgba(139,83,72,0.2)] cursor-pointer overflow-visible flex flex-col items-center justify-end pb-8">
                            <div class="absolute -top-10 w-full h-[75%] flex items-center justify-center p-2">
                                <img src="assets/ice cream products/tiramisu.png" alt="Cakes"
                                    class="w-[90%] h-[90%] object-contain filter drop-shadow-2xl transition-transform duration-700 ease-in-out group-hover:scale-110 group-hover:-translate-y-2 group-hover:rotate-2">
                            </div>
                            <div class="z-10 text-center mt-auto px-4">
                                <h3
                                    class="text-xl md:text-2xl font-serif font-bold text-[#4E342E] leading-tight mb-2 drop-shadow-sm">
                                    Ice Cream Cakes</h3>
                            </div>
                        </div>
                        <button
                            class="-mt-5 z-20 bg-gradient-to-r from-[#bcaa99] to-[#a1887f] text-white font-bold text-xs md:text-sm px-8 py-2.5 rounded-full shadow-lg hover:shadow-xl hover:from-[#a1887f] hover:to-[#8d6e63] transition-all transform hover:-translate-y-1 uppercase tracking-widest border border-white/20">
                            SELECT YOUR CAKES
                        </button>
                    </div>

                    <!-- Item 3 -->
                    <div class="flex flex-col items-center group relative z-10">
                        <div
                            class="relative w-full aspect-[4/5] bg-gradient-to-b from-white/40 to-white/10 backdrop-blur-xl rounded-[3rem] border border-white/60 shadow-[0_10px_30px_rgba(139,83,72,0.1)] transition-all duration-500 group-hover:bg-white/60 group-hover:scale-[1.03] group-hover:shadow-[0_20px_50px_rgba(139,83,72,0.2)] cursor-pointer overflow-visible flex flex-col items-center justify-end pb-8">
                            <div class="absolute -top-10 w-full h-[75%] flex items-center justify-center p-2">
                                <img src="assets/ice cream products/bubblegum.png" alt="Shakes"
                                    class="w-[90%] h-[90%] object-contain filter drop-shadow-2xl transition-transform duration-700 ease-in-out group-hover:scale-110 group-hover:-translate-y-2 group-hover:rotate-2">
                            </div>
                            <div class="z-10 text-center mt-auto px-4">
                                <h3
                                    class="text-xl md:text-2xl font-serif font-bold text-[#4E342E] leading-tight mb-2 drop-shadow-sm">
                                    Cooling Sips</h3>
                            </div>
                        </div>
                        <button
                            class="-mt-5 z-20 bg-gradient-to-r from-[#bcaa99] to-[#a1887f] text-white font-bold text-xs md:text-sm px-8 py-2.5 rounded-full shadow-lg hover:shadow-xl hover:from-[#a1887f] hover:to-[#8d6e63] transition-all transform hover:-translate-y-1 uppercase tracking-widest border border-white/20">
                            EXPLORE SHAKES
                        </button>
                    </div>

                </div>

            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer
        class="bg-gradient-to-br from-white/90 to-white/60 backdrop-blur-xl py-8 mt-12 border-t border-white/60 shadow-lg relative z-10 w-full">
        <div class="w-full max-w-7xl mx-auto px-6 flex flex-wrap justify-between items-center text-sm gap-4">

            <!-- Brand / Copyright -->
            <div class="flex flex-col gap-1">
                <span class="text-red-800 font-bold text-lg tracking-wider">ibaco</span>
                <p class="text-gray-600">© 2024 Hatsun Agro Product Ltd.</p>
            </div>

            <div class="flex gap-8">
                <div class="flex flex-col gap-2">
                    <a href="our-story.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors">Our Story</a>
                    <a href="products.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer text-[#922B21] font-bold">Our
                        Products</a>
                    <a href="store-locator.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer">Store
                        Locator</a>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer">Order
                        Online</span>
                    <a href="contact-us.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer">Contact
                        Us</a>
                </div>
            </div>

            <div class="flex gap-3">
                <span
                    class="w-8 h-8 rounded-full border border-gray-400/50 flex items-center justify-center text-red-600 hover:bg-red-50 cursor-pointer shadow-sm transition-transform hover:scale-110"><i
                        class="fab fa-instagram"></i></span>
                <span
                    class="w-8 h-8 rounded-full border border-gray-400/50 flex items-center justify-center text-blue-600 hover:bg-blue-50 cursor-pointer shadow-sm transition-transform hover:scale-110"><i
                        class="fab fa-facebook-f"></i></span>
            </div>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
