<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Ibaco</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Outfit:wght@300;400;500;700;900&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'pop-in': 'popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'bounce-slow': 'bounce 2s infinite',
                    },
                    keyframes: {
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9) translateY(20px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen w-full relative font-sans overflow-x-hidden text-[#5D4037]">

    <!-- Navbar injected by main.js -->

    <!-- Background Image -->
    <div class="fixed inset-0 z-0">
        <img src="assets/contact us bg.png" alt="Success Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-br from-green-100/30 to-blue-100/30 mix-blend-overlay"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 w-full min-h-screen flex items-center justify-center p-4">

        <div
            class="glass max-w-lg w-full p-12 rounded-[3rem] bg-white/40 backdrop-blur-2xl border border-white/60 shadow-[0_20px_60px_rgba(0,0,0,0.1)] flex flex-col items-center text-center animate-pop-in">

            <div
                class="w-24 h-24 rounded-full bg-green-100/50 flex items-center justify-center mb-6 shadow-inner animate-bounce-slow">
                <i class="fas fa-check-circle text-6xl text-green-500 drop-shadow-sm"></i>
            </div>

            <h1 class="text-4xl font-black text-[#5D4037] mb-4">Payment Successful!</h1>

            <p class="text-lg text-gray-700 font-medium mb-8 leading-relaxed">
                Thank you for your order. Your delicious treats are being prepared and will be with you shortly!
            </p>

            <div class="w-full h-px bg-gradient-to-r from-transparent via-black/10 to-transparent mb-8"></div>

            <a href="index.html"
                class="px-8 py-3 bg-gradient-to-r from-[#D81B60] to-[#880E4F] hover:from-[#C2185B] hover:to-[#6A1B9A] text-white font-bold rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all flex items-center gap-2 group">
                <i class="fas fa-home group-hover:-translate-x-1 transition-transform"></i> Back to Home
            </a>

        </div>

    </div>

    <!-- Main Logic -->
    <script type="module" src="js/main.js"></script>
    <script type="module">
        // Clear cart on load
        localStorage.removeItem('ibaco-cart');
    </script>
</body>

</html>
