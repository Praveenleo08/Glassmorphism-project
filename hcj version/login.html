<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ibaco</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Outfit:wght@300;400;500;700;900&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#e699bc] min-h-screen flex items-center justify-center bg-cover bg-center overflow-hidden relative"
    style="background-image: url('assets/Glassmorphism images Source/bg.png');">

    <!-- Abstract Blobs -->
    <div
        class="absolute top-[10%] left-[10%] w-[400px] h-[400px] bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float">
    </div>
    <div
        class="absolute bottom-[10%] right-[10%] w-[400px] h-[400px] bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float animation-delay-3000">
    </div>

    <div
        class="glass w-[900px] min-h-[580px] rounded-[3rem] p-8 md:p-16 relative flex flex-col md:flex-row-reverse gap-10 items-center animate-fade-in-left mx-4">

        <!-- Right Form (Left in Code but visually Right due to row-reverse) -->
        <div class="w-full md:w-[45%] flex flex-col z-10 pt-2">
            <h1 class="text-4xl md:text-5xl font-black mb-3 tracking-tight text-[#333]">Welcome Back!</h1>
            <p class="text-gray-600 mb-6 font-medium">
                Don't have an account? <a href="signup.html" class="text-[#880E4F] font-bold hover:underline">Sign
                    up</a>
            </p>

            <form id="login-form" class="flex flex-col gap-4">
                <p id="error-msg" class="text-red-500 text-sm font-bold pl-2 hidden"></p>

                <div class="flex flex-col gap-1">
                    <label class="text-gray-700 text-sm font-bold pl-2">E-mail</label>
                    <input type="email" id="email" required
                        class="w-full h-10 rounded-xl bg-white/40 border border-white/50 px-5 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#880E4F]/30 focus:bg-white/60 transition-all font-medium shadow-inner"
                        placeholder="name@example.com">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-gray-700 text-sm font-bold pl-2">Password</label>
                    <input type="password" id="password" required
                        class="w-full h-10 rounded-xl bg-white/40 border border-white/50 px-5 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#880E4F]/30 focus:bg-white/60 transition-all font-medium shadow-inner"
                        placeholder="••••••••">
                </div>

                <div class="flex justify-end pl-1">
                    <a href="#" class="text-sm text-[#880E4F] font-bold hover:underline">Forgot Password?</a>
                </div>

                <button type="submit"
                    class="w-full sm:w-[200px] h-12 mt-4 bg-[#333] hover:bg-black text-white rounded-full font-bold tracking-wide transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 active:scale-95 text-lg">
                    Log In
                </button>
            </form>

            <div class="flex gap-6 mt-6 ml-2">
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-md hover:scale-110 transition-transform text-red-500">
                    <i class="fab fa-google text-xl"></i>
                </button>
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-md hover:scale-110 transition-transform text-[#1877F2]">
                    <i class="fab fa-facebook-f text-lg"></i>
                </button>
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-md hover:scale-110 transition-transform text-black">
                    <i class="fab fa-twitter text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Left Logo (Visually Left) -->
        <div class="hidden md:flex w-[55%] flex-col items-center justify-center z-10 relative">
            <div class="absolute w-[300px] h-[300px] bg-white/20 rounded-full blur-2xl"></div>
            <img src="assets/logo.png" alt="ibaco"
                class="w-[400px] object-contain drop-shadow-2xl relative z-10 hover:scale-105 transition-transform duration-500">
        </div>
    </div>

    <!-- Auth Logic -->
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                console.log('User logged in');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = error.message.replace('Firebase:', '').trim();
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
