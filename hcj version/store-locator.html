<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Locator - Ibaco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive'],
                    },
                    colors: {
                        primary: '#922B21',
                        secondary: '#D81B60',
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen w-full relative font-sans overflow-x-hidden text-[#5D4037]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0">
        <!-- Using a placeholder or the asset if available. Assuming assets/contact us bg.png exists or we use a similar gradient/image -->
        <img src="https://images.unsplash.com/photo-1560008511-11c63416e52d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80"
            alt="Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/40"></div>
        <div class="absolute inset-0 bg-white/10 backdrop-blur-[2px]"></div>
    </div>

    <!-- Floating Blobs Animation -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div
            class="absolute top-10 left-10 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-blob">
        </div>
        <div
            class="absolute bottom-10 right-10 w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-blob animation-delay-2000">
        </div>
    </div>

    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <div class="relative z-10 w-full min-h-screen pt-44 pb-20 px-4 flex flex-col items-center">

        <!-- Header -->
        <div class="text-center mb-12 animate-fade-in-left">
            <h1 class="text-6xl md:text-7xl font-sans font-bold text-white drop-shadow-lg mb-2 tracking-tight">Locate Us
            </h1>
            <p class="text-xl text-white/90 font-medium tracking-wide">(Company owned parlours)</p>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-4 mb-10 w-full max-w-4xl justify-center animate-fade-in-left"
            style="animation-delay: 0.2s;">
            <button
                class="hidden md:block px-8 py-3 rounded-full bg-[#333] text-white font-bold shadow-xl transform hover:scale-105 transition-all border border-white/20">
                Coimbatore
            </button>
            <button
                class="px-8 py-3 rounded-full bg-white/20 backdrop-blur-md border border-white/40 shadow-xl text-white font-bold hover:bg-white/30 transition-all transform hover:scale-105">
                Select City
            </button>
            <button
                class="px-8 py-3 rounded-full bg-white/20 backdrop-blur-md border border-white/40 shadow-xl text-white font-bold hover:bg-white/30 transition-all transform hover:scale-105">
                Pincode
            </button>
        </div>

        <!-- Main Glass Content -->
        <div class="w-full max-w-6xl h-[600px] bg-white/10 backdrop-blur-2xl border border-white/30 rounded-[40px] shadow-[0_30px_60px_rgba(0,0,0,0.5)] flex flex-col md:flex-row overflow-hidden animate-fade-in-left glass"
            style="animation-delay: 0.4s;">

            <!-- Left: Map Placeholder -->
            <div class="w-full md:w-[60%] h-1/2 md:h-full relative p-4 group">
                <div
                    class="w-full h-full rounded-[30px] overflow-hidden bg-gray-900/40 relative shadow-inner border border-white/10 transition-all duration-500 group-hover:shadow-[0_0_30px_rgba(255,255,255,0.1)]">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15665.132805218738!2d76.955832!3d11.016844!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba859af2f971cb5%3A0x2fc1c817186f121d!2sCoimbatore%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1625123456789!5m2!1sen!2sin"
                        width="100%" height="100%" style="border: 0; filter: grayscale(20%) contrast(1.2) opacity(0.9);"
                        allowfullscreen="" loading="lazy"
                        class="group-hover:filter-none transition-all duration-700 scale-100 group-hover:scale-105"></iframe>

                    <!-- Map Overlay Text -->
                    <div
                        class="absolute bottom-6 left-6 bg-white/80 backdrop-blur-md px-4 py-2 rounded-lg shadow-lg pointer-events-none">
                        <p class="text-sm font-bold text-gray-800 flex items-center gap-2"><i
                                class="fas fa-map-marker-alt text-red-600"></i> 24 Locations Nearby</p>
                    </div>
                </div>
            </div>

            <!-- Right: List -->
            <div
                class="w-full md:w-[40%] h-1/2 md:h-full bg-white/5 backdrop-blur-md border-l border-white/10 flex flex-col">
                <div class="p-6 border-b border-white/10">
                    <h2 class="text-2xl font-bold text-white drop-shadow-md">Available Stores</h2>
                    <p class="text-white/60 text-sm">Scroll to view all</p>
                </div>

                <div class="flex-1 overflow-y-auto p-4 scrollbar-thin scrollbar-thumb-white/30 scrollbar-track-transparent hover:scrollbar-thumb-white/50 transition-colors"
                    id="store-list">
                    <!-- Stores injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer
        class="bg-gradient-to-br from-white/90 to-white/60 backdrop-blur-xl py-8 mt-12 border-t border-white/60 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 w-full">
        <div class="w-full max-w-7xl mx-auto px-6 flex flex-wrap justify-between items-center text-sm gap-4">
            <div class="flex flex-col gap-1">
                <span class="text-red-800 font-bold text-lg tracking-wider">ibaco</span>
                <p class="text-gray-600">© 2024 Hatsun Agro Product Ltd.</p>
            </div>

            <div class="flex gap-8">
                <div class="flex flex-col gap-2">
                    <a href="our-story.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors">Our Story</a>
                    <a href="products.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer">Our
                        Products</a>
                    <span class="text-[#D81B60] font-bold cursor-default">Store Locator</span>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer">Order
                        Online</span>
                    <a href="contact-us.html"
                        class="text-gray-700 hover:text-[#922B21] font-medium transition-colors cursor-pointer">Contact
                        Us</a>
                </div>
            </div>

            <div class="flex gap-3">
                <span
                    class="w-8 h-8 rounded-full border border-gray-400/50 flex items-center justify-center text-red-600 hover:bg-red-50 cursor-pointer shadow-sm transition-transform hover:scale-110"><i
                        class="fab fa-instagram"></i></span>
                <span
                    class="w-8 h-8 rounded-full border border-gray-400/50 flex items-center justify-center text-blue-600 hover:bg-blue-50 cursor-pointer shadow-sm transition-transform hover:scale-110"><i
                        class="fab fa-facebook-f"></i></span>
            </div>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/main.js"></script>
    <script>
        const stores = [
            { id: 1, name: "IBACO - TN - CBE - SARAVANAMPATTI", address: "SRI SARAVANA BAVA TOWERS, SRP MILLS NEAR, COIMBATORE-641032" },
            { id: 2, name: "IBACO - TN - CBE - PEELAMEDU", address: "1392A, GROUND FLOOR, AVINASHI ROAD, COIMBATORE, 641004" },
            { id: 3, name: "IBACO - TN - CBE - RAMANATHAPURAM", address: "NILGIRIS SUPER MARKET, COIMBATORE, TAMIL NADU, 641018" },
            { id: 4, name: "IBACO - TN - CBE - RS PURAM", address: "DB ROAD, RS PURAM, COIMBATORE, 641002" },
            { id: 5, name: "IBACO - TN - CHENNAI - ANNA NAGAR", address: "12, 2ND AVENUE, ANNA NAGAR, CHENNAI, 600040" }
        ];

        const storeList = document.getElementById('store-list');

        stores.forEach(store => {
            const el = document.createElement('div');
            el.className = "p-5 rounded-2xl bg-white/10 border border-white/10 hover:bg-white/20 hover:border-white/30 transition-all cursor-pointer group hover:translate-x-2 duration-300 shadow-md mb-4";
            el.innerHTML = `
                <h3 class="text-lg font-bold text-white mb-2 uppercase tracking-wide group-hover:text-pink-200 transition-colors">${store.name}</h3>
                <p class="text-white/80 leading-relaxed font-medium text-sm border-t border-white/10 pt-2 mt-1">
                    ${store.address}
                </p>
            `;
            storeList.appendChild(el);
        });
    </script>
</body>

</html>
